upstream kinhlac_backend {
    server backend:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cho phép upload file (ảnh khám, excel …) tới backend qua proxy
    client_max_body_size 50m;

    # ---- Security headers cơ bản ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---- Healthcheck cho Docker / load balancer ----
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # ---- Reverse proxy: /api/* -> backend:3001/* ----
    # Trailing slash trong proxy_pass sẽ cắt prefix /api/
    # => frontend gọi /api/auth/login, backend nhận /auth/login.
    location /api/ {
        proxy_pass         http://kinhlac_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 30s;
        # 600s: "Viết nháp" gọi AI 2 lần tuần tự (thân bài 3500 token + metadata), mỗi lần tới ~280s
        # (xem YESCALE_TIMEOUT_MS); ảnh gpt-image-2 ~90s. Để rộng kẻo cắt giữa chừng = 504.
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        proxy_buffering       off;
    }

    # ---- Cache asset CÓ hash trong tên (output build của Vite) ----
    # Vite bake content-hash vào tên file trong /assets/ (vd index-a1b2c3.js).
    # Nội dung đổi => tên file đổi => cache "immutable" 1 năm hoàn toàn an toàn.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Asset KHÔNG có hash trong tên ----
    # Engine kinh mạch 3D (/kinhmach3d/map3d.js, data/*.js), ảnh tĩnh, model .glb…
    # giữ NGUYÊN tên file qua mỗi lần deploy. KHÔNG được để "immutable":
    # nếu để, trình duyệt sẽ dùng bản cũ trong cả NĂM => bản cập nhật không "lên".
    # "no-cache" = vẫn lưu lại nhưng mỗi lần đều hỏi server (304 nếu chưa đổi => rất nhẹ),
    # đổi file là thấy ngay bản mới.
    location ~* \.(?:js|mjs|css|png|jpe?g|gif|ico|svg|webp|woff2?|ttf|eot|glb|gltf)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # ---- Blog: ưu tiên bản TĨNH (build-blog), thiếu thì để BACKEND render từ DB ----
    # Bài "Đã đăng" trên server chỉ nằm trong DB (chưa build .md) → vẫn xem được NGAY
    # nhờ fallback @blog_render. Khi deploy/build, file tĩnh sẽ thắng (tốt nhất cho SEO).
    # (Ảnh/css/js dưới /blog/ có đuôi mở rộng đã được location regex ở trên phục vụ tĩnh.)
    location /blog/ {
        try_files $uri $uri/ @blog_render;
    }
    location @blog_render {
        # KHÔNG trailing slash → giữ nguyên URI /blog/<slug>/ khi chuyển cho backend.
        proxy_pass         http://kinhlac_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # ---- SPA fallback ----
    # index.html KHÔNG có hash trong tên → PHẢI "no-cache" (luôn hỏi lại server) để sau mỗi
    # deploy, trình duyệt lấy NGAY shell mới (trỏ tới /assets/ hash mới) — tránh kẹt UI/CSS cũ.
    # Lưu ý: add_header trong location sẽ THAY (không kế thừa) add_header ở server → phải lặp lại
    # các security header ở đây kẻo bị mất trên trang HTML.
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
