<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Kinh Lạc Trương Gia — Đông Y đọc bằng dữ liệu">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7f0"/>
      <stop offset="1" stop-color="#f1e7d6"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6b4423"/>
      <stop offset="1" stop-color="#8a5a2b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- viền trang trí -->
  <rect x="28" y="28" width="1144" height="574" rx="28" fill="none" stroke="#e3d6c2" stroke-width="3"/>

  <!-- đường kinh lạc cách điệu (motif) -->
  <g stroke="#d8c4a4" stroke-width="3" fill="none" opacity="0.7">
    <path d="M120 150 C 320 90, 520 210, 760 130 S 1080 210, 1100 150"/>
    <path d="M120 500 C 300 560, 540 420, 780 520 S 1060 440, 1100 500"/>
  </g>
  <g fill="#6b4423" opacity="0.85">
    <circle cx="320" cy="120" r="7"/><circle cx="760" cy="130" r="7"/>
    <circle cx="540" cy="446" r="7"/><circle cx="780" cy="520" r="7"/>
  </g>

  <!-- huy hiệu HUYỆT (vòng + tâm + tia) — đúng chủ đề, vẽ bằng path nên raster sạch, không cần emoji -->
  <g transform="translate(600 232)">
    <circle r="74" fill="url(#band)"/>
    <circle r="40" fill="none" stroke="#ffffff" stroke-width="5"/>
    <circle r="9" fill="#ffffff"/>
    <g stroke="#ffffff" stroke-width="5" stroke-linecap="round">
      <path d="M0 -58 V -50 M0 50 V 58 M-58 0 H -50 M50 0 H 58"/>
    </g>
  </g>

  <!-- Tên thương hiệu -->
  <text x="600" y="400" text-anchor="middle" font-family="'Times New Roman', Georgia, serif"
        font-size="76" font-weight="800" fill="#5a3a1e" letter-spacing="1">Kinh Lạc Trương Gia</text>

  <!-- Big idea -->
  <text x="600" y="456" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="600" fill="#8a5a2b">Đông Y Đọc Bằng Dữ Liệu</text>

  <!-- chip thống kê -->
  <text x="600" y="530" text-anchor="middle" font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="26" fill="#7a6a55">1.058 Huyệt · 12 Đường Kinh · Bài Thuốc · Đo Kinh Lạc</text>
</svg>
